# mdl.gmxlab.ai · AAFNet academic project page

server {
    listen 80;
    listen [::]:80;
    server_name mdl.gmxlab.ai;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mdl.gmxlab.ai;

    ssl_certificate     /etc/letsencrypt/live/mdl.gmxlab.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mdl.gmxlab.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/mdl.gmxlab.ai;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /.well-known/acme-challenge/ { root /var/www/html; }

    location ~* \.(js|css|svg|woff2?|ttf|png|jpg|jpeg|webp|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ~ /\.(env|git|ssh|aws|htaccess|htpasswd|gitignore|dockerignore|DS_Store)(/|$) {
        deny all;
        return 404;
        access_log off;
        log_not_found off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    access_log /var/log/nginx/mdl.gmxlab.ai.access.log;
    error_log  /var/log/nginx/mdl.gmxlab.ai.error.log warn;
}
